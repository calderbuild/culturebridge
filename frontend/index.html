<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CultureBridge — AI 文化出海工作站</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;600&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&display=swap"
      rel="stylesheet"
    />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              ink: {
                950: "#0a0a14",
                900: "#0f0f1e",
                800: "#1a1a2e",
                700: "#252540",
                600: "#35355a",
              },
              gold: {
                DEFAULT: "#c9a96e",
                light: "#e0c992",
                dim: "rgba(201,169,110,0.12)",
                glow: "rgba(201,169,110,0.25)",
              },
              jade: { DEFAULT: "#5a9e7a" },
              cinnabar: { DEFAULT: "#c44e4e" },
            },
            fontFamily: {
              display: ['"Noto Serif SC"', '"Source Serif 4"', "serif"],
              body: ['"Noto Sans SC"', "system-ui", "sans-serif"],
              latin: ['"Source Serif 4"', "Georgia", "serif"],
            },
          },
        },
      };
    </script>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        font-family: "Noto Sans SC", system-ui, sans-serif;
        background: #0a0a14;
        color: #d4d4e0;
        overflow-x: hidden;
      }
      .step-panel {
        position: absolute;
        inset: 0;
        transition:
          transform 0.4s ease,
          opacity 0.4s ease;
      }
      .step-panel.left {
        transform: translateX(-100%);
        opacity: 0;
        pointer-events: none;
      }
      .step-panel.right {
        transform: translateX(100%);
        opacity: 0;
        pointer-events: none;
      }
      .step-panel.active {
        transform: translateX(0);
        opacity: 1;
        pointer-events: auto;
      }
      .chip {
        transition: all 0.15s ease;
      }
      .chip:hover {
        transform: translateY(-1px);
      }
      .chip.selected {
        background: rgba(201, 169, 110, 0.2);
        border-color: #c9a96e;
        color: #c9a96e;
      }
      .platform-check input:checked + span {
        background: rgba(201, 169, 110, 0.15);
        border-color: rgba(201, 169, 110, 0.5);
        color: #c9a96e;
      }
      .culture-mark {
        background: rgba(201, 169, 110, 0.12);
        border-bottom: 2px solid rgba(201, 169, 110, 0.4);
        cursor: help;
        padding: 1px 3px;
        border-radius: 2px;
        transition: all 0.2s ease;
      }
      .culture-mark:hover {
        background: rgba(201, 169, 110, 0.25);
        border-bottom-color: #c9a96e;
      }
      .scan-glow {
        animation: glowPulse 1.5s ease-in-out;
      }
      @keyframes glowPulse {
        0% {
          background: transparent;
          border-bottom-color: transparent;
        }
        40% {
          background: rgba(201, 169, 110, 0.3);
          border-bottom-color: #c9a96e;
        }
        100% {
          background: rgba(201, 169, 110, 0.12);
          border-bottom-color: rgba(201, 169, 110, 0.4);
        }
      }
      .trans-line {
        animation: lineIn 0.4s ease forwards;
        opacity: 0;
      }
      @keyframes lineIn {
        from {
          opacity: 0;
          transform: translateX(8px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }
      .agent-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        transition: all 0.3s ease;
      }
      .agent-dot.pending {
        background: #35355a;
      }
      .agent-dot.active {
        background: #c9a96e;
        animation: dotPulse 1s ease-in-out infinite;
      }
      .agent-dot.done {
        background: #5a9e7a;
      }
      .agent-dot.error {
        background: #c44e4e;
      }
      @keyframes dotPulse {
        0%,
        100% {
          opacity: 0.6;
        }
        50% {
          opacity: 1;
        }
      }
      .pub-card {
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease;
      }
      .pub-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
      }
      .modal-bg {
        transition: opacity 0.3s ease;
      }
      .modal-content {
        transition:
          transform 0.3s ease,
          opacity 0.3s ease;
      }
      .modal-bg.hidden {
        opacity: 0;
        pointer-events: none;
      }
      .modal-bg.hidden .modal-content {
        transform: translateY(20px);
        opacity: 0;
      }
      ::-webkit-scrollbar {
        width: 4px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #35355a;
        border-radius: 2px;
      }
      textarea:focus,
      select:focus,
      input:focus,
      button:focus-visible {
        outline: none;
        box-shadow: 0 0 0 2px rgba(201, 169, 110, 0.4);
      }
      @media (prefers-reduced-motion: reduce) {
        .step-panel,
        .chip,
        .pub-card,
        .modal-bg,
        .modal-content,
        .culture-mark,
        .scan-glow,
        .trans-line,
        .agent-dot {
          animation: none !important;
          transition: none !important;
        }
      }
    </style>
  </head>
  <body class="min-h-screen flex flex-col">
    <!-- Header -->
    <header
      class="flex-shrink-0 border-b border-ink-700/50 px-5 py-3 z-20 relative"
    >
      <div class="max-w-6xl mx-auto flex items-center justify-between">
        <div class="flex items-center gap-2.5">
          <span class="font-display text-gold text-lg font-bold tracking-wider"
            >CultureBridge</span
          >
          <span class="text-[10px] text-ink-600 hidden sm:inline"
            >一站式文化出海工作站</span
          >
        </div>
        <div id="step-indicator" class="flex items-center gap-2 text-[11px]">
          <span id="si-1" class="text-gold font-medium">1 选择</span>
          <span class="text-ink-600">&#8594;</span>
          <span id="si-2" class="text-ink-600">2 处理</span>
          <span class="text-ink-600">&#8594;</span>
          <span id="si-3" class="text-ink-600">3 发布</span>
        </div>
      </div>
    </header>

    <!-- Pipeline bar (Step 2 only) -->
    <div
      id="pipeline-bar"
      class="flex-shrink-0 border-b border-ink-700/30 px-5 py-1.5 hidden z-10 relative"
    >
      <div
        class="max-w-6xl mx-auto flex items-center gap-6 text-[10px] text-gray-500"
      >
        <div id="dot-creator" class="flex items-center gap-1.5 hidden">
          <div class="agent-dot pending"></div>
          <span>生成</span>
        </div>
        <div class="flex items-center gap-1.5">
          <div id="dot-scanner" class="agent-dot pending"></div>
          <span>扫描</span>
        </div>
        <div class="flex items-center gap-1.5">
          <div id="dot-matcher" class="agent-dot pending"></div>
          <span>匹配</span>
        </div>
        <div class="flex items-center gap-1.5">
          <div id="dot-translator" class="agent-dot pending"></div>
          <span>翻译</span>
        </div>
        <div class="flex items-center gap-1.5">
          <div id="dot-reviewer" class="agent-dot pending"></div>
          <span>审校</span>
        </div>
        <div class="flex items-center gap-1.5">
          <div id="dot-finalizer" class="agent-dot pending"></div>
          <span>终稿</span>
        </div>
        <div class="flex-1"></div>
        <span id="status-text" class="text-gray-600 truncate max-w-xs"></span>
        <span
          id="elapsed"
          class="text-gray-600 tabular-nums w-10 text-right"
        ></span>
      </div>
    </div>

    <!-- Steps Container -->
    <main
      class="flex-1 relative overflow-hidden"
      style="height: calc(100vh - 52px)"
    >
      <!-- ==================== STEP 1: Mode Selection ==================== -->
      <section id="step1" class="step-panel active">
        <div class="h-full flex items-center justify-center px-5">
          <div class="max-w-4xl w-full">
            <div class="text-center mb-8">
              <h1 class="font-display text-2xl text-white mb-2">
                中国文化内容，一键出海
              </h1>
              <p class="text-sm text-gray-500">选择你的方式开始</p>
            </div>
            <div class="grid md:grid-cols-2 gap-5">
              <!-- Beginner Mode -->
              <div
                class="bg-ink-800/50 border border-ink-700 rounded-2xl p-6 hover:border-gold/30 transition cursor-default"
              >
                <div class="flex items-center gap-2 mb-4">
                  <span
                    class="w-8 h-8 rounded-full bg-gold/10 flex items-center justify-center text-gold text-sm"
                    >AI</span
                  >
                  <div>
                    <p class="text-sm font-medium text-white">AI 帮你创作</p>
                    <p class="text-[11px] text-gray-500">
                      告诉 AI 你想推广什么
                    </p>
                  </div>
                </div>
                <input
                  id="intent-input"
                  type="text"
                  placeholder="例：向美国年轻人介绍端午节文化..."
                  class="w-full bg-ink-900 border border-ink-700 rounded-lg px-3 py-2.5 text-sm text-gray-200 placeholder-ink-600 mb-3"
                />
                <div class="flex flex-wrap gap-1.5 mb-4">
                  <button
                    onclick="setIntent('端午节龙舟文化')"
                    class="chip px-2.5 py-1 text-[10px] rounded-full border border-ink-600 text-gray-400 hover:text-gold hover:border-gold/30"
                  >
                    端午节
                  </button>
                  <button
                    onclick="setIntent('中国功夫武术文化')"
                    class="chip px-2.5 py-1 text-[10px] rounded-full border border-ink-600 text-gray-400 hover:text-gold hover:border-gold/30"
                  >
                    功夫
                  </button>
                  <button
                    onclick="setIntent('中国茶道文化')"
                    class="chip px-2.5 py-1 text-[10px] rounded-full border border-ink-600 text-gray-400 hover:text-gold hover:border-gold/30"
                  >
                    茶文化
                  </button>
                  <button
                    onclick="setIntent('中国书法艺术')"
                    class="chip px-2.5 py-1 text-[10px] rounded-full border border-ink-600 text-gray-400 hover:text-gold hover:border-gold/30"
                  >
                    书法
                  </button>
                  <button
                    onclick="setIntent('敦煌壁画艺术')"
                    class="chip px-2.5 py-1 text-[10px] rounded-full border border-ink-600 text-gray-400 hover:text-gold hover:border-gold/30"
                  >
                    敦煌
                  </button>
                  <button
                    onclick="setIntent('中华美食文化')"
                    class="chip px-2.5 py-1 text-[10px] rounded-full border border-ink-600 text-gray-400 hover:text-gold hover:border-gold/30"
                  >
                    美食
                  </button>
                </div>
                <p class="text-[10px] text-gray-500 mb-2">选择发布平台</p>
                <div class="flex flex-wrap gap-2 mb-4">
                  <label class="platform-check"
                    ><input
                      type="checkbox"
                      value="tiktok"
                      checked
                      class="hidden"
                    /><span
                      class="px-2.5 py-1 text-[10px] rounded-full border border-ink-600 text-gray-400 cursor-pointer transition"
                      >TikTok</span
                    ></label
                  >
                  <label class="platform-check"
                    ><input
                      type="checkbox"
                      value="instagram"
                      checked
                      class="hidden"
                    /><span
                      class="px-2.5 py-1 text-[10px] rounded-full border border-ink-600 text-gray-400 cursor-pointer transition"
                      >Instagram</span
                    ></label
                  >
                  <label class="platform-check"
                    ><input
                      type="checkbox"
                      value="youtube"
                      class="hidden"
                    /><span
                      class="px-2.5 py-1 text-[10px] rounded-full border border-ink-600 text-gray-400 cursor-pointer transition"
                      >YouTube</span
                    ></label
                  >
                  <label class="platform-check"
                    ><input
                      type="checkbox"
                      value="twitter"
                      class="hidden"
                    /><span
                      class="px-2.5 py-1 text-[10px] rounded-full border border-ink-600 text-gray-400 cursor-pointer transition"
                      >X</span
                    ></label
                  >
                  <label class="platform-check"
                    ><input
                      type="checkbox"
                      value="reddit"
                      class="hidden"
                    /><span
                      class="px-2.5 py-1 text-[10px] rounded-full border border-ink-600 text-gray-400 cursor-pointer transition"
                      >Reddit</span
                    ></label
                  >
                </div>
                <button
                  onclick="startBeginner()"
                  class="w-full bg-gold hover:bg-gold-light text-ink-950 font-medium py-2.5 rounded-lg transition text-sm"
                >
                  AI 生成 + 出海
                </button>
              </div>
              <!-- Pro Mode -->
              <div
                class="bg-ink-800/50 border border-ink-700 rounded-2xl p-6 hover:border-gold/30 transition cursor-default"
              >
                <div class="flex items-center gap-2 mb-4">
                  <span
                    class="w-8 h-8 rounded-full bg-ink-700 flex items-center justify-center text-gray-400 text-sm font-display"
                    >Pro</span
                  >
                  <div>
                    <p class="text-sm font-medium text-white">粘贴你的内容</p>
                    <p class="text-[11px] text-gray-500">
                      剧本 / 网文 / 游戏对白
                    </p>
                  </div>
                </div>
                <textarea
                  id="pro-input"
                  rows="5"
                  placeholder="粘贴中文剧本、网文章节或游戏对白..."
                  class="w-full bg-ink-900 border border-ink-700 rounded-lg px-3 py-2.5 text-sm text-gray-200 placeholder-ink-600 resize-none mb-3"
                ></textarea>
                <div class="flex gap-2 mb-3">
                  <select
                    id="pro-type"
                    class="flex-1 bg-ink-900 border border-ink-700 rounded-lg px-2 py-1.5 text-xs text-gray-400"
                  >
                    <option value="drama">短剧</option>
                    <option value="novel">网文</option>
                    <option value="game">游戏</option>
                  </select>
                  <select
                    id="pro-lang"
                    class="flex-1 bg-ink-900 border border-ink-700 rounded-lg px-2 py-1.5 text-xs text-gray-400"
                  >
                    <option value="en">English</option>
                    <option value="ja">Japanese</option>
                    <option value="ko">Korean</option>
                  </select>
                  <select
                    id="pro-market"
                    class="flex-1 bg-ink-900 border border-ink-700 rounded-lg px-2 py-1.5 text-xs text-gray-400"
                  >
                    <option value="us">US</option>
                    <option value="sea">SEA</option>
                    <option value="jp">JP</option>
                    <option value="kr">KR</option>
                  </select>
                </div>
                <div class="flex gap-1.5 mb-3">
                  <button
                    onclick="loadProDemo('palace')"
                    class="chip px-2 py-1 text-[10px] rounded border border-ink-600 text-gray-500 hover:text-gold hover:border-gold/30"
                  >
                    宫廷剧
                  </button>
                  <button
                    onclick="loadProDemo('xianxia')"
                    class="chip px-2 py-1 text-[10px] rounded border border-ink-600 text-gray-500 hover:text-gold hover:border-gold/30"
                  >
                    修仙
                  </button>
                  <button
                    onclick="loadProDemo('game')"
                    class="chip px-2 py-1 text-[10px] rounded border border-ink-600 text-gray-500 hover:text-gold hover:border-gold/30"
                  >
                    游戏
                  </button>
                </div>
                <button
                  onclick="startPro()"
                  class="w-full bg-ink-700 hover:bg-ink-600 text-gray-200 font-medium py-2.5 rounded-lg transition text-sm"
                >
                  文化适配 + 出海
                </button>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- ==================== STEP 2: Cultural Processing ==================== -->
      <section id="step2" class="step-panel right">
        <div class="h-full flex">
          <!-- Left: source -->
          <div class="w-1/2 border-r border-ink-700/30 flex flex-col">
            <div
              class="px-5 py-2 border-b border-ink-700/20 flex justify-between"
            >
              <span class="text-[11px] text-gray-500 uppercase tracking-wide"
                >原文 Source</span
              >
              <span id="s2-charcount" class="text-[10px] text-gray-600"></span>
            </div>
            <div id="s2-source" class="flex-1 overflow-y-auto p-5">
              <div
                id="s2-annotated"
                class="text-sm text-gray-300 leading-loose"
              ></div>
            </div>
          </div>
          <!-- Right: translation -->
          <div class="w-1/2 flex flex-col bg-ink-900/30">
            <div class="px-5 py-2 border-b border-ink-700/20">
              <span class="text-[11px] text-gray-500 uppercase tracking-wide"
                >适配翻译 Adapted</span
              >
            </div>
            <div id="s2-translation" class="flex-1 overflow-y-auto p-5">
              <div id="s2-lines" class="space-y-0.5"></div>
            </div>
          </div>
        </div>
      </section>

      <!-- ==================== STEP 3: Publish ==================== -->
      <section id="step3" class="step-panel right">
        <div class="h-full flex flex-col">
          <!-- Platform tabs -->
          <div class="flex-shrink-0 border-b border-ink-700/30 px-5">
            <div class="max-w-4xl mx-auto flex items-center gap-1 py-2">
              <button
                onclick="switchPlatform('tiktok')"
                class="plat-tab px-4 py-1.5 text-xs rounded-lg transition"
                data-plat="tiktok"
              >
                TikTok
              </button>
              <button
                onclick="switchPlatform('instagram')"
                class="plat-tab px-4 py-1.5 text-xs rounded-lg transition"
                data-plat="instagram"
              >
                Instagram
              </button>
              <button
                onclick="switchPlatform('youtube')"
                class="plat-tab px-4 py-1.5 text-xs rounded-lg transition"
                data-plat="youtube"
              >
                YouTube
              </button>
              <button
                onclick="switchPlatform('twitter')"
                class="plat-tab px-4 py-1.5 text-xs rounded-lg transition"
                data-plat="twitter"
              >
                X
              </button>
              <button
                onclick="switchPlatform('reddit')"
                class="plat-tab px-4 py-1.5 text-xs rounded-lg transition"
                data-plat="reddit"
              >
                Reddit
              </button>
              <div class="flex-1"></div>
              <button
                onclick="goStep(1)"
                class="text-[10px] text-gray-600 hover:text-gold transition"
              >
                重新开始
              </button>
            </div>
          </div>
          <!-- Platform preview area -->
          <div
            class="flex-1 overflow-y-auto flex items-start justify-center p-8"
          >
            <div class="max-w-lg w-full">
              <div id="plat-tiktok" class="plat-content hidden"></div>
              <div id="plat-instagram" class="plat-content hidden"></div>
              <div id="plat-youtube" class="plat-content hidden"></div>
              <div id="plat-twitter" class="plat-content hidden"></div>
              <div id="plat-reddit" class="plat-content hidden"></div>
            </div>
          </div>
          <!-- Bottom stats -->
          <div class="flex-shrink-0 border-t border-ink-700/30 px-5 py-3">
            <div
              class="max-w-4xl mx-auto flex items-center justify-between text-[11px] text-gray-500"
            >
              <span id="publish-stats">5 个平台素材已就绪</span>
              <span class="text-gold font-medium"
                >CultureBridge 一站式出海</span
              >
            </div>
          </div>
        </div>
      </section>
    </main>

    <!-- Publish Modal -->
    <div
      id="pub-modal"
      class="modal-bg hidden fixed inset-0 z-50 flex items-center justify-center"
      style="background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(4px)"
    >
      <div
        class="modal-content bg-ink-800 border border-ink-700 rounded-2xl p-8 max-w-sm w-full mx-4 text-center"
      >
        <div id="pub-step1" class="">
          <div
            class="w-12 h-12 rounded-full bg-gold/10 flex items-center justify-center mx-auto mb-4"
          >
            <span id="pub-icon" class="text-gold text-xl">T</span>
          </div>
          <p class="text-white font-medium mb-2" id="pub-title">
            连接 TikTok 账号
          </p>
          <p class="text-xs text-gray-500 mb-6">
            授权 CultureBridge 发布内容到你的账号
          </p>
          <button
            onclick="simulatePublish()"
            class="w-full bg-gold text-ink-950 font-medium py-2.5 rounded-lg text-sm"
          >
            授权并发布
          </button>
          <button
            onclick="closeModal()"
            class="w-full text-gray-500 text-xs mt-3 hover:text-gray-300 transition"
          >
            取消
          </button>
        </div>
        <div id="pub-step2" class="hidden">
          <div
            class="w-12 h-12 rounded-full bg-gold/10 flex items-center justify-center mx-auto mb-4 animate-spin"
            style="animation-duration: 1.5s"
          >
            <span class="text-gold text-lg">&#9696;</span>
          </div>
          <p class="text-white text-sm">
            正在发布到 <span id="pub-platform-name"></span>...
          </p>
        </div>
        <div id="pub-step3" class="hidden">
          <div
            class="w-12 h-12 rounded-full bg-jade/20 flex items-center justify-center mx-auto mb-4"
          >
            <span class="text-jade text-xl">&#10003;</span>
          </div>
          <p class="text-white font-medium mb-1">发布成功</p>
          <p class="text-xs text-gray-500 mb-4">
            内容已发布到 <span id="pub-done-name"></span>
          </p>
          <button
            onclick="closeModal()"
            class="w-full bg-ink-700 text-gray-200 py-2 rounded-lg text-sm"
          >
            完成
          </button>
        </div>
      </div>
    </div>

    <!-- Culture Card (floating) -->
    <div
      id="culture-card"
      class="fixed z-40 w-80 bg-ink-800 border border-gold/30 rounded-xl p-4 shadow-2xl transition-all duration-200"
      style="
        transform: scale(0.95) translateY(4px);
        opacity: 0;
        pointer-events: none;
      "
    >
      <div class="flex items-center justify-between mb-2">
        <span
          id="cc-concept"
          class="font-display text-gold text-base font-semibold"
        ></span>
        <span
          id="cc-genre"
          class="text-[9px] px-1.5 py-0.5 rounded bg-gold/10 text-gold/60"
        ></span>
      </div>
      <p
        id="cc-context"
        class="text-[11px] text-gray-400 mb-3 leading-relaxed"
      ></p>
      <div class="grid grid-cols-2 gap-2 mb-3">
        <div>
          <p class="text-[9px] text-jade font-medium mb-1 uppercase">Good</p>
          <div id="cc-good" class="text-[11px] text-gray-300 space-y-0.5"></div>
        </div>
        <div>
          <p class="text-[9px] text-cinnabar font-medium mb-1 uppercase">
            Never use
          </p>
          <div
            id="cc-bad"
            class="text-[11px] text-gray-500 line-through space-y-0.5"
          ></div>
        </div>
      </div>
      <p
        id="cc-note"
        class="text-[10px] text-gray-400 border-t border-ink-700 pt-2 leading-relaxed font-latin italic"
      ></p>
    </div>

    <script>
      // ========== STATE ==========
      let currentStep = 1,
        currentJobId = null,
        jobOutput = null,
        jobMode = null,
        elapsedInterval = null,
        startTime = null,
        currentPlatform = "tiktok";

      // ========== DEMOS ==========
      const DEMOS = {

        xianxia: `师兄，我的灵根资质太差，恐怕无法筑基。\n金丹已碎，元婴即将成形，此刻不能有丝毫分心。\n道心不稳，心魔趁虚而入，若不能斩除，修为将全废。\n渡劫雷霆降临，天道不容逆天改命之人。\n灵石已经耗尽，丹田中的灵气所剩无几。`,
        game: `少侠，你的灵根资质不错，可愿拜入我青云门？\n师父，弟子愿以毕生修炼道心，绝不辜负门派期望。\n道友请留步，贫道有一事相求。\n你这走火入魔之人，休要在此撒野！\n江湖险恶，你一个筑基期的小修士，如何能独闯万妖山？`,
      };
      const GOOGLE = {
        palace: [
          "Your Majesty, I can't do it!",
          "I'm tired, step back.",
          "Enemies meet on a narrow road.",
          "You dare break ground on Tai Sui's head!",
          "30 years east, 30 years west, don't bully the young poor.",
          "Know face not heart, who is friend who is foe?",
          "Put her in the cold palace!",
          "Greetings, this servant pays respects.",

        ],
        xianxia: [
          "My spiritual root quality is too poor.",

        game: [

          "Taoist friend please stay, poor Taoist has request.",
          "You who went fire entered devil, don't be wild!",
          "Rivers lakes dangerous, you small foundation builder.",
        ],
      };
      const ALL_CONCEPTS = [
        "臣妾",
        "本宫",
        "皇上",
        "奴才",
        "微臣",
        "哀家",
        "冤家",
        "翻牌子",
        "打入冷宫",
        "赐死",
        "太岁头上动土",
        "三十年河东三十年河西",
        "知人知面不知心",
        "娘娘",
        "请安",
        "侍寝",
        "莫欺少年穷",
        "三尺白绫",
        "冤家路窄",
        "妃嫔",
        "渡劫",
        "金丹",
        "元婴",
        "灵根",
        "丹田",
        "道心",
        "飞升",
        "心魔",
        "仙人",
        "筑基",
        "天道",
        "灵石",
        "御剑飞行",
        "结丹",
        "灵气",
        "修为",
        "逆天改命",
        "道友",
        "贫道",
        "师父",
        "弟子",
        "少侠",
        "门派",
        "师兄",
        "妖兽",
        "江湖",
        "走火入魔",
        "内力",
        "轻功",
      ];

      // ========== STEP NAVIGATION ==========
      function goStep(n) {
        ["step1", "step2", "step3"].forEach((id, i) => {
          const el = document.getElementById(id);
          el.className =
            "step-panel " +
            (i + 1 < n ? "left" : i + 1 > n ? "right" : "active");
        });
        currentStep = n;
        document.getElementById("si-1").className =
          n >= 1 ? "text-gold font-medium" : "text-ink-600";
        document.getElementById("si-2").className =
          n >= 2 ? "text-gold font-medium" : "text-ink-600";
        document.getElementById("si-3").className =
          n >= 3 ? "text-gold font-medium" : "text-ink-600";
        document
          .getElementById("pipeline-bar")
          .classList.toggle("hidden", n !== 2);
      }

      // ========== STEP 1: MODE HANDLERS ==========
      function setIntent(text) {
        document.getElementById("intent-input").value = text;
      }
      function loadProDemo(type) {
        document.getElementById("pro-input").value = DEMOS[type];
        document.getElementById("pro-type").value =
          type === "palace" ? "drama" : type === "game" ? "game" : "novel";
      }

      async function startBeginner() {
        const intent = document.getElementById("intent-input").value.trim();
        if (!intent) return;
        jobMode = "beginner";
        const platforms = [
          ...document.querySelectorAll(".platform-check input:checked"),
        ].map((c) => c.value);
        document.getElementById("dot-creator").classList.remove("hidden");
        goStep(2);
        resetDots();
        startTimer();
        try {
          const r = await fetch("/api/create-from-intent", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              intent,
              content_type: "general",
              target_lang: "en",
              target_market: "us",
              platforms,
            }),
          });
          const d = await r.json();
          currentJobId = d.job_id;
          listenSSE(d.job_id);
        } catch (e) {
          setStatus("连接失败", "error");
        }
      }

      async function startPro() {
        const content = document.getElementById("pro-input").value.trim();
        if (!content) return;
        jobMode = "pro";
        document.getElementById("dot-creator").classList.add("hidden");
        document.getElementById("s2-annotated").textContent = content;
        document.getElementById("s2-charcount").textContent =
          content.length + " 字";
        goStep(2);
        resetDots();
        startTimer();
        try {
          const r = await fetch("/api/create", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              content,
              content_type: document.getElementById("pro-type").value,
              target_lang: document.getElementById("pro-lang").value,
              target_market: document.getElementById("pro-market").value,
            }),
          });
          const d = await r.json();
          currentJobId = d.job_id;
          listenSSE(d.job_id);
        } catch (e) {
          setStatus("连接失败", "error");
        }
      }

      // ========== SSE ==========
      function listenSSE(jobId) {
        const src = new EventSource(`/api/stream/${jobId}`);
        src.onmessage = (e) => {
          const ev = JSON.parse(e.data);
          handleEvent(ev);
          if (ev.stage === "done") {
            src.close();
            stopTimer();
            if (ev.data?.status === "completed") fetchResults(jobId);
            else setStatus(ev.message || "失败", "error");
          }
        };
        src.onerror = () => {
          src.close();
          stopTimer();
        };
      }

      async function fetchResults(jobId) {
        const r = await fetch(`/api/status/${jobId}`);
        const d = await r.json();
        jobOutput = d.output;
        renderStep2Results();
        setTimeout(() => {
          renderStep3();
          goStep(3);
        }, 1500);
      }

      // ========== AGENT DOTS ==========
      const DOT_MAP = {
        content_creator: "dot-creator",
        scanner: "dot-scanner",
        matcher: "dot-matcher",
        translator: "dot-translator",
        reviewer: "dot-reviewer",
        finalizer: "dot-finalizer",
      };
      function resetDots() {
        Object.values(DOT_MAP).forEach((id) => {
          const el = document.getElementById(id);
          if (el) {
            const d = el.querySelector?.(".agent-dot") || el;
            d.className = "agent-dot pending";
          }
        });
      }
      function handleEvent(ev) {
        const dotId = DOT_MAP[ev.stage];
        if (!dotId) return;
        const el = document.getElementById(dotId);
        const dot = el.querySelector?.(".agent-dot") || el;
        if (ev.data?.level === "error") {
          dot.className = "agent-dot error";
          return;
        }
        if (ev.data?.degraded) {
          dot.className = "agent-dot error";
          return;
        }
        if (
          ev.message.includes("完成") ||
          ev.message.includes("发现") ||
          ev.message.includes("命中") ||
          ev.message.includes("生成")
        ) {
          dot.className = "agent-dot done";
        } else {
          dot.className = "agent-dot active";
        }
        setStatus(ev.message);
      }
      function setStatus(msg, lv) {
        const el = document.getElementById("status-text");
        el.textContent = msg;
        el.className =
          lv === "error"
            ? "text-cinnabar text-[10px] truncate max-w-xs"
            : "text-gray-500 text-[10px] truncate max-w-xs";
      }
      function startTimer() {
        startTime = Date.now();
        if (elapsedInterval) clearInterval(elapsedInterval);
        elapsedInterval = setInterval(() => {
          document.getElementById("elapsed").textContent =
            Math.floor((Date.now() - startTime) / 1000) + "s";
        }, 1000);
      }
      function stopTimer() {
        if (elapsedInterval) {
          clearInterval(elapsedInterval);
          elapsedInterval = null;
        }
      }

      // ========== STEP 2 RENDERING ==========
      function renderStep2Results() {
        const translations = jobOutput?.translation || [];
        // Annotate source
        const content =
          jobMode === "pro"
            ? document.getElementById("pro-input").value
            : translations.map((t) => t.original || "").join("\n");
        const sorted = [...ALL_CONCEPTS].sort((a, b) => b.length - a.length);
        let html = "";
        content.split("\n").forEach((line) => {
          const marks = [];
          const used = new Array(line.length).fill(false);
          for (const c of sorted) {
            let idx = line.indexOf(c);
            while (idx !== -1) {
              let ov = false;
              for (let k = idx; k < idx + c.length; k++) if (used[k]) ov = true;
              if (!ov) {
                marks.push({ start: idx, end: idx + c.length, concept: c });
                for (let k = idx; k < idx + c.length; k++) used[k] = true;
              }
              idx = line.indexOf(c, idx + 1);
            }
          }
          marks.sort((a, b) => a.start - b.start);
          let r = "",
            p = 0;
          for (const m of marks) {
            if (m.start > p) r += esc(line.slice(p, m.start));
            r += `<span class="culture-mark scan-glow" data-concept="${escA(m.concept)}" onmouseenter="showCard(this,event)" onmouseleave="hideCard()">${esc(m.concept)}</span>`;
            p = m.end;
          }
          if (p < line.length) r += esc(line.slice(p));
          html += `<p class="mb-1.5">${r}</p>`;
        });
        document.getElementById("s2-annotated").innerHTML = html;
        document.getElementById("s2-charcount").textContent =
          content.length + " 字";

        // Translation lines
        const ct =
          document.getElementById("pro-type")?.value === "drama"
            ? "palace"
            : document.getElementById("pro-type")?.value === "game"
              ? "game"
              : "xianxia";
        const google = GOOGLE[ct] || [];
        const container = document.getElementById("s2-lines");
        container.innerHTML = "";
        translations.forEach((t, i) => {
          const div = document.createElement("div");
          div.className = "trans-line";
          div.style.animationDelay = i * 0.08 + "s";
          div.innerHTML = `<div class="py-2 px-1 border-b border-ink-700/10"><p class="text-sm text-gray-200 font-latin leading-relaxed">${esc(t.translation || "")}</p>${google[i] ? `<p class="text-[10px] text-gray-600 mt-0.5 line-through italic">${esc(google[i])}</p>` : ""}</div>`;
          container.appendChild(div);
        });
      }

      // ========== STEP 3 RENDERING ==========
      function renderStep3() {
        const pc = jobOutput?.platform_content || {};
        // TikTok
        const tk = pc.tiktok || {};
        document.getElementById("plat-tiktok").innerHTML = `
    <div class="pub-card bg-black rounded-3xl p-5 border border-gray-800 max-w-xs mx-auto" style="aspect-ratio:9/14;display:flex;flex-direction:column;justify-content:flex-end">
      <div class="mt-auto">
        <p class="text-white text-sm mb-2 leading-relaxed">${esc(tk.caption || "TikTok content generating...")}</p>
        <p class="text-[11px] text-blue-400">${(tk.hashtags || []).map((h) => "#" + h.replace("#", "")).join(" ")}</p>
        <p class="text-[10px] text-gray-500 mt-2">Cover: ${esc(tk.cover_text_suggestion || "")}</p>
      </div>
    </div>
    <button onclick="openPublish('TikTok')" class="w-full max-w-xs mx-auto block mt-4 bg-gradient-to-r from-pink-500 to-cyan-400 text-white font-medium py-2.5 rounded-lg text-sm">发布到 TikTok</button>`;

        // Instagram
        const ig = pc.instagram || {};
        document.getElementById("plat-instagram").innerHTML = `
    <div class="pub-card bg-white rounded-xl overflow-hidden max-w-sm mx-auto border">
      <div class="px-3 py-2 flex items-center gap-2 border-b"><div class="w-7 h-7 rounded-full bg-gradient-to-br from-purple-500 to-orange-400"></div><span class="text-xs font-medium text-gray-800">culturebridge</span></div>
      <div class="bg-gradient-to-br from-amber-100 to-orange-50 aspect-square flex items-center justify-center"><span class="text-4xl">&#127983;</span></div>
      <div class="p-3"><p class="text-xs text-gray-800 leading-relaxed whitespace-pre-line">${esc((ig.caption || "").substring(0, 300))}</p><p class="text-[10px] text-blue-600 mt-1">${(
        ig.hashtags || []
      )
        .slice(0, 10)
        .map((h) => "#" + h.replace("#", ""))
        .join(" ")}</p></div>
    </div>
    <button onclick="openPublish('Instagram')" class="w-full max-w-sm mx-auto block mt-4 bg-gradient-to-r from-purple-500 via-pink-500 to-orange-400 text-white font-medium py-2.5 rounded-lg text-sm">发布到 Instagram</button>`;

        // YouTube
        const yt = pc.youtube || {};
        document.getElementById("plat-youtube").innerHTML = `
    <div class="pub-card bg-white rounded-xl overflow-hidden max-w-lg mx-auto border">
      <div class="bg-gray-900 aspect-video flex items-center justify-center"><span class="text-red-500 text-4xl">&#9654;</span></div>
      <div class="p-4"><h3 class="text-sm font-medium text-gray-900 mb-1">${esc(yt.title || "")}</h3><p class="text-[11px] text-gray-600 line-clamp-3">${esc((yt.description || "").substring(0, 200))}</p><div class="flex flex-wrap gap-1 mt-2">${(
        yt.tags || []
      )
        .slice(0, 8)
        .map(
          (t) =>
            `<span class="text-[9px] px-1.5 py-0.5 bg-gray-100 text-gray-500 rounded">${esc(t)}</span>`,
        )
        .join("")}</div></div>
    </div>
    <button onclick="openPublish('YouTube')" class="w-full max-w-lg mx-auto block mt-4 bg-red-600 hover:bg-red-700 text-white font-medium py-2.5 rounded-lg text-sm">发布到 YouTube</button>`;

        // Twitter/X
        const tw = pc.twitter || {};
        const tweets = tw.tweets || [];
        document.getElementById("plat-twitter").innerHTML =
          tweets
            .map(
              (t, i) => `
    <div class="pub-card bg-black rounded-xl border border-gray-800 p-4 mb-3">
      <div class="flex items-start gap-3"><div class="w-9 h-9 rounded-full bg-gold/20 flex-shrink-0 flex items-center justify-center"><span class="text-gold text-xs font-display">CB</span></div>
      <div><p class="text-xs font-medium text-white mb-0.5">CultureBridge</p><p class="text-sm text-gray-300 leading-relaxed">${esc(t)}</p></div></div>
    </div>`,
            )
            .join("") +
          `<button onclick="openPublish('X')" class="w-full block mt-2 bg-black border border-gray-700 text-white font-medium py-2.5 rounded-lg text-sm hover:bg-gray-900 transition">发布到 X</button>`;

        // Reddit
        const rd = pc.reddit || {};
        document.getElementById("plat-reddit").innerHTML = `
    <div class="pub-card bg-white rounded-xl border p-4 max-w-lg mx-auto">
      <div class="flex items-center gap-2 mb-2">${(rd.subreddit_suggestions || ["r/CDrama"]).map((s) => `<span class="text-[10px] px-2 py-0.5 bg-blue-50 text-blue-700 rounded-full">${esc(s)}</span>`).join("")}</div>
      <h3 class="text-sm font-medium text-gray-900 mb-2">${esc(rd.title || "")}</h3>
      <p class="text-xs text-gray-600 leading-relaxed line-clamp-6 whitespace-pre-line">${esc((rd.body || "").substring(0, 400))}</p>
    </div>
    <button onclick="openPublish('Reddit')" class="w-full max-w-lg mx-auto block mt-4 bg-orange-600 hover:bg-orange-700 text-white font-medium py-2.5 rounded-lg text-sm">发布到 Reddit</button>`;

        switchPlatform("tiktok");
      }

      function switchPlatform(name) {
        currentPlatform = name;
        document
          .querySelectorAll(".plat-content")
          .forEach((el) => el.classList.add("hidden"));
        document.getElementById("plat-" + name).classList.remove("hidden");
        document.querySelectorAll(".plat-tab").forEach((btn) => {
          btn.classList.toggle("bg-gold/20", btn.dataset.plat === name);
          btn.classList.toggle("text-gold", btn.dataset.plat === name);
          btn.classList.toggle("text-gray-500", btn.dataset.plat !== name);
        });
      }

      // ========== PUBLISH MODAL ==========
      function openPublish(name) {
        const icons = {
          TikTok: "T",
          Instagram: "I",
          YouTube: "Y",
          X: "X",
          Reddit: "R",
        };
        document.getElementById("pub-icon").textContent =
          icons[name] || name[0];
        document.getElementById("pub-title").textContent =
          "连接 " + name + " 账号";
        document.getElementById("pub-platform-name").textContent = name;
        document.getElementById("pub-done-name").textContent = name;
        document.getElementById("pub-step1").classList.remove("hidden");
        document.getElementById("pub-step2").classList.add("hidden");
        document.getElementById("pub-step3").classList.add("hidden");
        document.getElementById("pub-modal").classList.remove("hidden");
      }
      function simulatePublish() {
        document.getElementById("pub-step1").classList.add("hidden");
        document.getElementById("pub-step2").classList.remove("hidden");
        setTimeout(() => {
          document.getElementById("pub-step2").classList.add("hidden");
          document.getElementById("pub-step3").classList.remove("hidden");
        }, 2000);
      }
      function closeModal() {
        document.getElementById("pub-modal").classList.add("hidden");
      }

      // ========== CULTURE CARD ==========
      function showCard(el, ev) {
        const concept = el.dataset.concept;
        const card = document.getElementById("culture-card");
        document.getElementById("cc-concept").textContent = concept;
        document.getElementById("cc-genre").textContent = "";
        document.getElementById("cc-context").textContent = "";
        document.getElementById("cc-good").innerHTML = "";
        document.getElementById("cc-bad").innerHTML = "";
        let noteText = "";
        const translations = jobOutput?.translation || [];
        for (const t of translations) {
          if (t.original && t.original.includes(concept) && t.cultural_note) {
            noteText = t.cultural_note;
            break;
          }
        }
        const decisions = jobOutput?.decision_report?.decisions || [];
        for (const d of decisions) {
          if (d.concept === concept) {
            document.getElementById("cc-context").textContent =
              d.significance || "";
            document.getElementById("cc-good").innerHTML =
              `<p>${esc(d.chosen_translation || "")}</p>`;
            document.getElementById("cc-bad").innerHTML = (
              d.alternatives_rejected || []
            )
              .map((r) => `<p>${esc(r)}</p>`)
              .join("");
            document.getElementById("cc-genre").textContent = d.kb_source || "";
            break;
          }
        }
        document.getElementById("cc-note").textContent = noteText || "";
        const rect = el.getBoundingClientRect();
        card.style.left = Math.min(rect.left, window.innerWidth - 340) + "px";
        card.style.top =
          Math.min(rect.bottom + 8, window.innerHeight - 280) + "px";
        card.style.transform = "scale(1) translateY(0)";
        card.style.opacity = "1";
        card.style.pointerEvents = "auto";
      }
      function hideCard() {
        const c = document.getElementById("culture-card");
        c.style.transform = "scale(.95) translateY(4px)";
        c.style.opacity = "0";
        c.style.pointerEvents = "none";
      }

      // ========== UTILS ==========
      function esc(s) {
        const d = document.createElement("div");
        d.textContent = s;
        return d.innerHTML;
      }
      function escA(s) {
        return (s || "").replace(/"/g, "&quot;");
      }
    </script>
  </body>
</html>
