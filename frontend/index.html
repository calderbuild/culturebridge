          extend: {

    <style>
      * {
        box-sizing: border-box;
      }
      body {
        font-family: "Noto Sans SC", system-ui, sans-serif;
        background: #0a0a14;
        color: #d4d4e0;
        overflow-x: hidden;
      }
      .culture-mark {
        background: rgba(201, 169, 110, 0.12);
        border-bottom: 2px solid rgba(201, 169, 110, 0.4);
        cursor: help;
        padding: 1px 3px;
        border-radius: 2px;
        transition: all 0.2s ease;
      }
      .culture-mark:hover {
        background: rgba(201, 169, 110, 0.25);
        border-bottom-color: #c9a96e;
      }
      .culture-card {
        position: fixed;
        z-index: 50;
        width: 340px;
        background: #1a1a2e;
        border: 1px solid rgba(201, 169, 110, 0.3);
        border-radius: 12px;
        padding: 16px;
        box-shadow:
          0 20px 60px rgba(0, 0, 0, 0.6),
          0 0 30px rgba(201, 169, 110, 0.08);
        transform: scale(0.95) translateY(4px);
        opacity: 0;
        pointer-events: none;
        transition: all 0.2s ease;
      }
      .culture-card.visible {
        transform: scale(1) translateY(0);
        opacity: 1;
        pointer-events: auto;
      }
      .trans-line {
        animation: lineIn 0.4s ease forwards;
        opacity: 0;
      }
      @keyframes lineIn {
        from {
          opacity: 0;
          transform: translateX(8px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }
      .scan-glow {
        animation: glowPulse 1.5s ease-in-out;
      }
      @keyframes glowPulse {
        0% {
          background: transparent;
          border-bottom-color: transparent;
        }
        40% {
          background: rgba(201, 169, 110, 0.3);
          border-bottom-color: #c9a96e;
        }
        100% {
          background: rgba(201, 169, 110, 0.12);
          border-bottom-color: rgba(201, 169, 110, 0.4);
        }
      }
      .agent-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        transition: all 0.3s ease;
      }
      .agent-dot.pending {
        background: #35355a;
      }
      .agent-dot.active {
        background: #c9a96e;
        animation: dotPulse 1s ease-in-out infinite;
      }
      .agent-dot.done {
        background: #5a9e7a;
      }
      .agent-dot.error {
        background: #c44e4e;
      }
      @keyframes dotPulse {
        0%,
        100% {
          opacity: 0.6;
        }
        50% {
          opacity: 1;
        }
      }
      .risk-high {
        background: rgba(196, 78, 78, 0.15);
        color: #e87171;
        border: 1px solid rgba(196, 78, 78, 0.3);
      }
      .risk-medium {
        background: rgba(234, 179, 8, 0.12);
        color: #eab308;
        border: 1px solid rgba(234, 179, 8, 0.25);
      }
      .risk-low {
        background: rgba(90, 158, 122, 0.15);
        color: #5a9e7a;
        border: 1px solid rgba(90, 158, 122, 0.3);
      }
      ::-webkit-scrollbar {
        width: 4px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #35355a;
        border-radius: 2px;
      }
      textarea:focus,
      select:focus,
      button:focus-visible {
        outline: none;
        box-shadow: 0 0 0 2px rgba(201, 169, 110, 0.4);
      }
      @media (prefers-reduced-motion: reduce) {
        .culture-mark,
        .culture-card,
        .trans-line,
        .scan-glow,
        .agent-dot {
          animation: none !important;
          transition: none !important;
        }
      }
    </style>
  </head>

          "The tribulation thunder descends, heaven doesn't allow fate defiers.",
          "The spirit stones are exhausted, spiritual energy almost gone.",
          "Flying with a sword for a thousand miles before flying up.",

          "Above immortals: heavenly, golden, and great Luo golden immortals.",
        ],
        game: [

          "This sword called Broken Water, forged with meteorite iron.",

          "You who went fire and entered devil, don't be wild here!",

      const ALL_CONCEPTS = [

      function loadDemo(t) {
        document.getElementById("content-input").value = DEMOS[t];
        document.getElementById("content-type").value =
          t === "palace" ? "drama" : t === "game" ? "game" : "novel";
        updateCharCount();
      }
      function updateCharCount() {
        document.getElementById("char-count").textContent =
          document.getElementById("content-input").value.length + " 字";
      }

      async function startAnalysis() {
        const content = document.getElementById("content-input").value.trim();
        if (!content) return;
        const btn = document.getElementById("start-btn");
        btn.disabled = true;
        btn.textContent = "分析中...";
        btn.classList.add("opacity-50");
        document.getElementById("pipeline-bar").classList.remove("hidden");
        document.getElementById("translation-empty").classList.add("hidden");
        document
          .getElementById("translation-output")
          .classList.remove("hidden");
        document.getElementById("translation-lines").innerHTML = "";
        document.getElementById("intel-panel").classList.add("hidden");
        document.getElementById("source-input").classList.remove("hidden");
        document.getElementById("source-annotated").classList.add("hidden");
        document.getElementById("export-btn").classList.add("hidden");
        resetDots();
        startTimer();
        try {
          const resp = await fetch("/api/create", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              content,
              content_type: document.getElementById("content-type").value,
              target_lang: document.getElementById("target-lang").value,
              target_market: document.getElementById("target-market").value,
            }),
          });
          const data = await resp.json();
          currentJobId = data.job_id;
          listenSSE(currentJobId);
        } catch (e) {
          stopTimer();
          btn.disabled = false;
          btn.textContent = "文化 X 光";
          btn.classList.remove("opacity-50");
          setStatus("连接失败", "error");
        }
      }

      function listenSSE(jobId) {
        const source = new EventSource(`/api/stream/${jobId}`);
        source.onmessage = (e) => {
          const event = JSON.parse(e.data);
          handleEvent(event);
          if (event.stage === "done") {
            source.close();
            stopTimer();
            if (event.data?.status === "completed") {
              fetchResults(jobId);
            } else {
              setStatus(event.message || "失败", "error");
              const btn = document.getElementById("start-btn");
              btn.disabled = false;
              btn.textContent = "文化 X 光";
              btn.classList.remove("opacity-50");
            }
          }
        };
        source.onerror = () => {
          source.close();
          stopTimer();
        };
      }

      async function fetchResults(jobId) {
        const resp = await fetch(`/api/status/${jobId}`);
        const data = await resp.json();
        jobOutput = data.output;
        renderResults();
        const btn = document.getElementById("start-btn");
        btn.disabled = false;
        btn.textContent = "文化 X 光";
        btn.classList.remove("opacity-50");
        document.getElementById("export-btn").classList.remove("hidden");
      }

      const DOT_MAP = {
        scanner: "dot-scanner",
        matcher: "dot-matcher",
        translator: "dot-translator",
        reviewer: "dot-reviewer",
        finalizer: "dot-finalizer",
      };
      function resetDots() {
        Object.values(DOT_MAP).forEach((id) => {
          document.getElementById(id).className = "agent-dot pending";
        });
      }
      function handleEvent(event) {
        const dotId = DOT_MAP[event.stage];
        if (!dotId) return;
        const dot = document.getElementById(dotId);
        if (event.data?.level === "error") {
          dot.className = "agent-dot error";
          return;
        }
        if (event.data?.degraded) {
          dot.className = "agent-dot error";
          setStatus(event.message, "warn");
          return;
        }
        if (
          event.message.includes("完成") ||
          event.message.includes("发现") ||
          event.message.includes("命中")
        ) {
          dot.className = "agent-dot done";
        } else {
          dot.className = "agent-dot active";
        }
        setStatus(event.message);
      }
      function setStatus(msg, level) {
        const el = document.getElementById("status-text");
        el.textContent = msg;
        el.className =
          level === "error"
            ? "text-cinnabar text-[10px] truncate max-w-xs"
            : level === "warn"
              ? "text-yellow-500 text-[10px] truncate max-w-xs"
              : "text-gray-500 text-[10px] truncate max-w-xs";
      }
      function startTimer() {
        startTime = Date.now();
        if (elapsedInterval) clearInterval(elapsedInterval);
        elapsedInterval = setInterval(() => {
          document.getElementById("elapsed").textContent =
            Math.floor((Date.now() - startTime) / 1000) + "s";
        }, 1000);
      }
      function stopTimer() {
        if (elapsedInterval) {
          clearInterval(elapsedInterval);
          elapsedInterval = null;
        }
      }

      function renderResults() {
        renderAnnotatedSource();
        renderTranslation();
        renderIntelPanel();
      }

      function renderAnnotatedSource() {
        const content = document.getElementById("content-input").value;
        let html = "";
        const lines = content.split("\n");
        const sorted = [...ALL_CONCEPTS].sort((a, b) => b.length - a.length);
        lines.forEach((line) => {
          // Find all concept positions in the raw line, then build HTML segments
          const marks = [];
          const used = new Array(line.length).fill(false);
          for (const concept of sorted) {
            let idx = line.indexOf(concept);
            while (idx !== -1) {
              let overlap = false;
              for (let k = idx; k < idx + concept.length; k++) {
                if (used[k]) {
                  overlap = true;
                  break;
                }
              }
              if (!overlap) {
                marks.push({ start: idx, end: idx + concept.length, concept });
                for (let k = idx; k < idx + concept.length; k++) used[k] = true;
              }
              idx = line.indexOf(concept, idx + 1);
            }
          }
          marks.sort((a, b) => a.start - b.start);
          let result = "";
          let pos = 0;
          for (const m of marks) {
            if (m.start > pos) result += escHtml(line.slice(pos, m.start));
            result += `<span class="culture-mark scan-glow" data-concept="${escAttr(m.concept)}" onmouseenter="showCard(this,event)" onmouseleave="hideCard()">${escHtml(m.concept)}</span>`;
            pos = m.end;
          }
          if (pos < line.length) result += escHtml(line.slice(pos));
          html += `<p class="mb-1.5">${result}</p>`;
        });
        document.getElementById("annotated-text").innerHTML = html;
        document.getElementById("source-input").classList.add("hidden");
        document.getElementById("source-annotated").classList.remove("hidden");
      }

      function renderTranslation() {
        const container = document.getElementById("translation-lines");
        container.innerHTML = "";
        const translations = jobOutput?.translation || [];
        const ct =
          document.getElementById("content-type").value === "drama"
            ? "palace"
            : document.getElementById("content-type").value === "game"
              ? "game"
              : "xianxia";
        const google = GOOGLE[ct] || [];
        translations.forEach((t, i) => {
          const div = document.createElement("div");
          div.className = "trans-line group";
          div.style.animationDelay = i * 0.08 + "s";
          const g = google[i] || "";
          div.innerHTML = `<div class="flex gap-3 py-2 px-1 rounded hover:bg-ink-800/30 transition border-b border-ink-700/10">
      <div class="flex-1">
        <p class="text-sm text-gray-200 font-latin leading-relaxed">${escHtml(t.translation || "")}</p>
        ${g ? `<p class="text-[10px] text-gray-600 mt-0.5 line-through italic">${escHtml(g)}</p>` : ""}
      </div>
      <div class="flex items-start gap-1 flex-shrink-0 opacity-0 group-hover:opacity-100 transition">
        ${t.cultural_note ? '<span class="px-1.5 py-0.5 text-[9px] rounded bg-gold/10 text-gold/60">KB</span>' : ""}
        ${t.confidence === "low" ? '<span class="px-1.5 py-0.5 text-[9px] rounded bg-cinnabar/10 text-cinnabar">审核</span>' : ""}
      </div>
    </div>`;
          container.appendChild(div);
        });
      }

      function renderIntelPanel() {
        document.getElementById("intel-panel").classList.remove("hidden");
        renderDecisions();
        renderRisks();
        renderNotes();
        renderPromo();
        switchIntel("decisions");
      }

      function renderDecisions() {
        const c = document.getElementById("intel-decisions");
        const r = jobOutput?.decision_report;
        if (!r || r._parse_failed) {
          c.innerHTML = '<p class="text-gray-600 text-xs">数据不可用</p>';
          return;
        }
        c.innerHTML = (r.decisions || [])
          .map(
            (d) =>
              `<div class="flex gap-3 py-2 border-b border-ink-700/20"><span class="text-gold text-sm font-display flex-shrink-0 w-20">${escHtml(d.concept || "")}</span><div class="flex-1 text-xs"><span class="text-jade">${escHtml(d.chosen_translation || "")}</span>${(d.alternatives_rejected || []).length ? `<span class="text-gray-600 ml-2 line-through">${d.alternatives_rejected.join(", ")}</span>` : ""}<p class="text-gray-500 mt-0.5">${escHtml(d.rationale || "")}</p></div></div>`,
          )
          .join("");
      }

      function renderRisks() {
        const c = document.getElementById("intel-risks");
        const r = jobOutput?.risk_report;
        if (!r || r._parse_failed) {
          c.innerHTML = '<p class="text-gray-600 text-xs">数据不可用</p>';
          return;
        }
        const lv = r.overall_risk_level || "low";
        const rc =
          { high: "risk-high", medium: "risk-medium", low: "risk-low" }[lv] ||
          "risk-low";
        c.innerHTML =
          `<div class="flex items-center gap-2 mb-3"><span class="px-2 py-0.5 text-[10px] rounded ${rc}">${lv.toUpperCase()}</span><span class="text-xs text-gray-400">${escHtml(r.summary || "")}</span></div>` +
          (r.risks || [])
            .map((x) => {
              const xc =
                { high: "risk-high", medium: "risk-medium", low: "risk-low" }[
                  x.risk_level
                ] || "risk-low";
              return `<div class="flex items-start gap-2 py-1.5"><span class="px-1.5 py-0.5 text-[9px] rounded ${xc}">${x.risk_level || "?"}</span><div class="text-xs text-gray-400">${escHtml(x.concept || x.risk_reason || "")} <span class="text-gray-600">${escHtml(x.suggestion || "")}</span></div></div>`;
            })
            .join("");
      }

      function renderNotes() {
        const c = document.getElementById("intel-notes");
        const n = jobOutput?.cultural_notes || [];
        if (!n.length) {
          c.innerHTML = '<p class="text-gray-600 text-xs">暂无</p>';
          return;
        }
        c.innerHTML = n
          .map(
            (x) =>
              `<div class="py-2 border-b border-ink-700/20"><p class="text-xs text-gray-400">${escHtml(x.original || "")}</p><p class="text-[11px] text-gold/70 mt-1 font-latin italic">${escHtml(x.note || "")}</p></div>`,
          )
          .join("");
      }

      function renderPromo() {
        const c = document.getElementById("intel-promo");
        const p = jobOutput?.promo_materials;
        if (!p || p._parse_failed) {
          c.innerHTML = '<p class="text-gray-600 text-xs">数据不可用</p>';
          return;
        }
        c.innerHTML =
          (p.synopsis
            ? `<p class="text-xs text-gray-300 mb-3">${escHtml(p.synopsis)}</p>`
            : "") +
          (p.social_posts || [])
            .map(
              (x) =>
                `<div class="py-1.5 border-b border-ink-700/20"><span class="text-[9px] text-gold/50">${escHtml(x.platform || "")}</span><p class="text-xs text-gray-400 mt-0.5">${escHtml(x.text || "")}</p></div>`,
            )
            .join("");
      }

      function switchIntel(name) {
        document
          .querySelectorAll(".intel-content")
          .forEach((el) => el.classList.add("hidden"));
        document.getElementById("intel-" + name).classList.remove("hidden");
        document.querySelectorAll(".intel-tab").forEach((btn) => {
          btn.classList.toggle("border-gold", btn.dataset.tab === name);
          btn.classList.toggle("text-gold", btn.dataset.tab === name);
        });
      }

      function showCard(el, ev) {
        const concept = el.dataset.concept;
        const card = document.getElementById("culture-card");
        document.getElementById("cc-concept").textContent = concept;
        document.getElementById("cc-genre").textContent = "";
        document.getElementById("cc-context").textContent = "";
        document.getElementById("cc-good").innerHTML = "";
        document.getElementById("cc-bad").innerHTML = "";
        let noteText = "";
        const translations = jobOutput?.translation || [];
        for (const t of translations) {
          if (t.original && t.original.includes(concept) && t.cultural_note) {
            noteText = t.cultural_note;
            break;
          }
        }
        const decisions = jobOutput?.decision_report?.decisions || [];
        for (const d of decisions) {
          if (d.concept === concept) {
            document.getElementById("cc-context").textContent =
              d.significance || "";
            document.getElementById("cc-good").innerHTML =
              `<p>${escHtml(d.chosen_translation || "")}</p>`;
            document.getElementById("cc-bad").innerHTML = (
              d.alternatives_rejected || []
            )
              .map((r) => `<p>${escHtml(r)}</p>`)
              .join("");
            document.getElementById("cc-genre").textContent = d.kb_source || "";
            break;
          }
        }
        document.getElementById("cc-note").textContent =
          noteText || "文化注释将在分析完成后显示";
        const rect = el.getBoundingClientRect();
        card.style.left = Math.min(rect.left, window.innerWidth - 360) + "px";
        card.style.top =
          Math.min(rect.bottom + 8, window.innerHeight - 280) + "px";
        card.classList.add("visible");
      }
      function hideCard() {
        document.getElementById("culture-card").classList.remove("visible");
      }

      function exportReport() {
        if (!jobOutput) return;
        let md = "# CultureBridge Report\n\n## Translation\n\n";
        (jobOutput.translation || []).forEach((t) => {
          md += `**${t.original || ""}**\n${t.translation || ""}\n\n`;
        });
        md += "## Cultural Notes\n\n";
        (jobOutput.cultural_notes || []).forEach((n) => {
          md += `- **${n.original || ""}**: ${n.note || ""}\n`;
        });
        const blob = new Blob([md], { type: "text/markdown" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "culturebridge_report.md";
        a.click();
      }

      function escHtml(s) {
        const d = document.createElement("div");
        d.textContent = s;
        return d.innerHTML;
      }
      function escAttr(s) {
        return (s || "").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
      }
    </script>
  </body>
</html>
